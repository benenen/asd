name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # manual trigger to verify the build without cutting a tag

permissions:
  contents: write # create the release and upload assets

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full binary (CLI + daemon + GUI), built natively on each arch. aarch64
          # uses a native arm64 runner rather than a cross container: the cross
          # image is ubuntu 16.04 (glibc 2.23 / git 2.7), too old to build the
          # vendored ghostty via zig (`copy_file_range` needs glibc 2.27+).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # asd-dioxus (GUI, in the default features) pulls webkit2gtk-4.1 via
      # Dioxus Desktop → wry; its -sys crates need the GTK dev libraries. Both
      # matrix entries here are Linux (x86_64 + aarch64), so install
      # unconditionally.
      - name: Install GUI system deps (webkit2gtk-4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (full)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        env:
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          [ "$version" = "$REF_NAME" ] && version="$(git rev-parse --short HEAD)"
          name="asd-${version}-${TARGET}"
          stage="$(mktemp -d)/${name}"
          mkdir -p "$stage"
          cp "target/${TARGET}/release/asd" "$stage/"
          [ -f LICENSE ] && cp LICENSE "$stage/" || true
          [ -f README.md ] && cp README.md "$stage/" || true
          tar -czf "${name}.tar.gz" -C "$(dirname "$stage")" "${name}"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.archive }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.archive }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Native Windows build — the GPU GUI client (`gui` feature only). The `local`
  # side pulls the Unix-only `nix` crate (daemon/PTY), which can't compile for
  # Windows; the Windows deliverable is the GUI. russh → aws-lc-sys needs NASM to
  # assemble its crypto.
  windows:
    name: x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # asd-dioxus's build.rs shells out to npm (esbuild vendor bundle). Pin a
      # Node so npm is on PATH; the build.rs invokes it via `cmd /C npm` because
      # `Command::new("npm")` can't resolve the `.cmd` shim on Windows.
      - name: Install Node (asd-dioxus build.rs runs npm)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install NASM (aws-lc-sys, pulled by russh)
        uses: ilammy/setup-nasm@v1

      - name: Build (GUI only)
        run: cargo build --release --locked --no-default-features --features gui --target x86_64-pc-windows-msvc

      - name: Package
        id: pkg
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME -replace '^v', ''
          if ($version -eq $env:REF_NAME) { $version = (git rev-parse --short HEAD) }
          $target = "x86_64-pc-windows-msvc"
          $name = "asd-$version-$target"
          $stage = Join-Path $env:RUNNER_TEMP $name
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/$target/release/asd.exe" $stage
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage }
          if (Test-Path README.md) { Copy-Item README.md $stage }
          $archive = "$name.zip"
          Compress-Archive -Path $stage -DestinationPath $archive -Force
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.archive }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.archive }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  # macOS — full binary (CLI + daemon + GUI); macOS is unix, so the daemon side
  # compiles. Apple Silicon (arm64) only, on a native runner; Zig builds the
  # vendored ghostty. The Intel (x86_64) leg was dropped: GitHub's macos-13
  # runners are frequently unavailable and were blocking the whole release.
  macos:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runner so zig never cross-compiles ghostty (the
          # `<arch>-macos-none` cross target didn't link libSystem).
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (full)
        # Zig needs the macOS SDK to resolve libSystem (posix_memalign, sigaction,
        # waitpid, …) when building the vendored ghostty; point it at the SDK
        # explicitly so the link doesn't fail with "undefined symbol".
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        env:
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          [ "$version" = "$REF_NAME" ] && version="$(git rev-parse --short HEAD)"
          name="asd-${version}-${TARGET}"
          stage="$(mktemp -d)/${name}"
          mkdir -p "$stage"
          cp "target/${TARGET}/release/asd" "$stage/"
          [ -f LICENSE ] && cp LICENSE "$stage/" || true
          [ -f README.md ] && cp README.md "$stage/" || true
          tar -czf "${name}.tar.gz" -C "$(dirname "$stage")" "${name}"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.archive }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.archive }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Publish the npm installer (@shibenenen/asd) to the public npm registry after
  # every platform binary is attached to the release. The npm package ships no
  # binary — its postinstall downloads the matching asset from this release — so
  # it MUST publish only once the build jobs have uploaded their archives.
  # Requires an `NPM_TOKEN` repo secret: an npm "Automation" access token for the
  # shibenenen account (automation tokens bypass publish 2FA, as CI needs).
  npm:
    name: npm publish
    needs: [build, windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (npmjs registry)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync package version to the release tag
        working-directory: deploy/npm
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          echo "publishing @shibenenen/asd@${version}"
          # Keep the published version in lockstep with the release tag so the
          # postinstall fetches the v<version> assets this workflow just built.
          npm version --no-git-tag-version --allow-same-version "$version"

      - name: Validate the package (syntax + offline URL mapping, no network)
        working-directory: deploy/npm
        run: npm test

      - name: Publish to npm
        working-directory: deploy/npm
        env:
          # publishConfig in package.json pins access=public + the npmjs registry.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
