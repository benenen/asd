name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # The vendored libghostty-vt-sys is built with Zig (pinned to the version
      # used locally); it must be on PATH before `cargo build`.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Zig links its build runner against libSystem; on the CI runner it needs
      # to be pointed at the macOS SDK explicitly, or the link fails with
      # undefined symbols (__availability_version_check, _dispatch_*, …).
      - name: Point Zig at the macOS SDK
        if: runner.os == 'macOS'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --workspace

      # e2e tests spawn a real `asd daemon` with ptys; on macOS the
      # list_and_kill test exercises the sysctl(KERN_PROCARGS2) foreground path.
      - name: Test
        run: cargo test --workspace
