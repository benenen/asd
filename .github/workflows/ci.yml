name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # rustfmt doesn't compile anything, so check it before the slower clippy
      # build and fail fast on formatting.
      - name: Format
        run: cargo fmt --all -- --check

      # clippy builds the workspace, so it needs Zig for libghostty-vt-sys.
      # asd-dioxus (the GUI, in the default features) pulls webkit2gtk-4.1 via
      # Dioxus Desktop → wry; its -sys crates need the GTK dev libraries + their
      # pkg-config files, which the runner image does not ship.
      - name: Install GUI system deps (webkit2gtk-4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # The vendored libghostty-vt-sys is built with Zig (pinned to the version
      # used locally); it must be on PATH before `cargo build`.
      # asd-dioxus (the GUI, in the default features) pulls webkit2gtk-4.1 via
      # Dioxus Desktop → wry; its -sys crates need the GTK dev libraries + their
      # pkg-config files, which the runner image does not ship.
      - name: Install GUI system deps (webkit2gtk-4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  release-build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # asd-dioxus (the GUI, in the default features) pulls webkit2gtk-4.1 via
      # Dioxus Desktop → wry; its -sys crates need the GTK dev libraries + their
      # pkg-config files, which the runner image does not ship.
      - name: Install GUI system deps (webkit2gtk-4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (release)
        run: cargo build --workspace --release

      # Publish the single optimized `asd` binary (CLI + daemon + GUI) so a run
      # produces a downloadable artifact.
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: asd-linux-x86_64
          path: target/release/asd
          if-no-files-found: error
