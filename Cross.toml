# `cross` config for the aarch64 Linux release build.
#
# Only aarch64 is cross-compiled (x86_64 is built natively). The `local`
# feature (CLI + daemon, no GUI) is what ships for aarch64 — wgpu can't be
# cross-compiled there cheaply. The vendored libghostty-vt-sys builds via Zig,
# so Zig goes into the container; build.rs passes `-Dtarget` for the cross build.

[build.env]
passthrough = [
    # Reach the network through a host proxy when one is set (empty/harmless in CI).
    "HTTP_PROXY",
    "HTTPS_PROXY",
    "http_proxy",
    "https_proxy",
    "ALL_PROXY",
    "all_proxy",
    # HOME is `/` in the cross container, so zig's global cache defaults to
    # `/.cache/zig` → "AccessDenied" when building the vendored ghostty. Point it
    # at a writable dir. (Set to a fixed value, not forwarded from the host.)
    "ZIG_GLOBAL_CACHE_DIR=/tmp/zig-global-cache",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    # The cross image (ubuntu 18.04) ships git 2.17, which lacks
    # `git clone --filter=blob:none` — libghostty-vt-sys's build.rs uses that to
    # fetch ghostty, failing with "unknown option filter=blob:none". Pull a
    # modern git from the git-core PPA (2.19+ has partial clone).
    "apt-get update && apt-get install --yes --no-install-recommends curl ca-certificates xz-utils git software-properties-common",
    "add-apt-repository -y ppa:git-core/ppa && apt-get update && apt-get install --yes --only-upgrade git",
    "curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz -o /tmp/zig.tar.xz",
    "mkdir -p /opt/zig && tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1",
    "ln -sf /opt/zig/zig /usr/local/bin/zig",
]

# Windows x64 (`make win`). Best-effort: the ghostty Zig build cross-targets
# windows-gnu, but wgpu (the GUI) does not cross-compile from Linux reliably —
# prefer a native Windows build, or `WIN_FEATURES="--no-default-features
# --features gui"` / `--features local`.
[target.x86_64-pc-windows-gnu]
pre-build = [
    "apt-get update && apt-get install --yes --no-install-recommends curl ca-certificates xz-utils git",
    "curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz -o /tmp/zig.tar.xz",
    "mkdir -p /opt/zig && tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1",
    "ln -sf /opt/zig/zig /usr/local/bin/zig",
]
